# === Chess Environment Configuration ===
env:
  # --- Core Rollout Settings ---
  group_size: 8
  max_num_workers: 4
  max_eval_workers: 16
  max_num_workers_per_node: 8
  steps_per_eval: 100
  max_token_length: 2048 #max tokens for generation in trainer
  eval_handling: "STOP_TRAIN"
  eval_limit_ratio: 0.1
  inference_weight: 1.0
  batch_size: 8
  max_batches_offpolicy: 3
  tokenizer_name: "codingmonster1234/chess-sft-modelv2"
  use_wandb: true
  rollout_server_url: "http://localhost:8000"
  total_steps: 300
  wandb_name: "chess_puzzle_solving_env"
  num_rollouts_to_keep: 32
  num_rollouts_per_group_for_logging: -1
  ensure_scores_are_not_same: true
  min_items_sent_before_logging: 2
  include_messages: false
  worker_timeout: 600.0

  # --- Thinking / Reasoning Settings ---
  thinking_mode: false
  reasoning_effort: null
  max_reasoning_tokens: null
  custom_thinking_prompt: null

  # --- Stockfish Engine Settings ---
  #Set the STOCKFISH_PATH env variable
  stockfish_depth: 18
  engine_time_limit: 0.1
  max_concurrent_evals: 4
  reward_scaling_factor: 250.0

  # --- Rewards & Penalties ---
  invalid_move_notation_reward: 0.01
  illegal_move_reward: 0.05
  format_fail_reward: 0.0
  length_penalty_coefficient: 0.2
  training_rollout_temperature: 1.0
  eval_rollout_temperature: 0.0

  # --- Training Dataset Configuration ---
  train_dataset_config:
    dataset_name: "codingmonster1234/chess-puzzles-rlvr"
    split: "train"
    use_curriculum: true
    bucket_size: 100
    min_rating: 400
    max_rating: 3300
    start_bucket: "bucket:400-500"
    curr_bucket_lookup_prob: 0.85
    dataset_percent_to_use: 0.001
    use_infinite_looping: true

  # --- Validation Dataset Configuration ---
  validation_dataset_config:
    dataset_name: "codingmonster1234/chess-puzzles-rlvr"
    split: "validation"
    use_curriculum: false
    dataset_percent_to_use: 0.0002
    use_infinite_looping: false

  # --- Checkpoints & Data Paths ---
  train_dataset_checkpoint_path: null
  validation_dataset_checkpoint_path: null
  data_path_to_save_groups: "chess_env/rollouts/chess_env_rollout_groups.jsonl"
  data_dir_to_save_evals: "chess_env/chess_env_eval_results"

# === vLLM / OpenAI Server Configurations ===
openai:
  - model_name: "codingmonster1234/chess-sft-modelv2"
    tokenizer_name: "codingmonster1234/chess-sft-modelv2"
    server_type: "vllm"
    base_url: "http://localhost:9001/v1"
    api_key: "x"
    timeout: 1200
    num_max_requests_at_once: 512
    num_requests_for_eval: 256
    rolling_buffer_length: 1000
    n_kwarg_is_ignored: false
    health_check: true
    weight: 1.0

# === Global Flags ===
slurm: false
testing: false


# Tinker-specific configuration
tinker:
  lora_rank: 32
  learning_rate: 0.00004
  max_token_trainer_length: 3072 #max token length = prompt + generation tokens here
  checkpoint_dir: "./tinker_model_checkpoints/"
  tinker_pretrained_weights: "tinker://fe1c5bb0-bf01-52e5-b5b3-03c9acd17c9b:train:0/weights/final"
  save_checkpoint_interval: 20

  # Wandb configuration for trainer
  wandb_project: "chess_puzz_env-training"
  wandb_group: null  # Will be auto-generated if not specified
  wandb_run_name: "atropos-tinker-run"
