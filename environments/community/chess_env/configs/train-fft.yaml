base_model: codingmonster1234/chess-sft-modelv2
torch_compile: true
rl: grpo
learning_rate: 1e-5
optimizer: adamw_torch_fused
lr_scheduler: cosine
warmup_steps: 10

# --- vLLM Serving Configuration ---
# Since you are using CUDA_VISIBLE_DEVICES to isolate GPUs,
# host 0.0.0.0 allows the trainer to communicate with the vLLM instance.
vllm:
  host: "0.0.0.0"
  port: 9001
  tensor_parallel_size: 1 # vLLM runs on its own single GPU
  gpu_memory_utilization: 0.45 # Leave some headroom
  enable_prefix_caching: true
  max_model_len: 3072
  device: auto

# --- GRPO / TRL Specifics ---
trl:
  beta: 0.05               # KL divergence penalty weight
  num_generations: 8       # Number of completions to sample per prompt
  max_completion_length: 2048
  use_liger_loss: true
  use_vllm: true
  vllm_mode: colocate            # for single gpu training
  vllm_enable_sleep_mode: true  # for single gpu training
  vllm_server_port: 9001
  vllm_server_timeout: 60.0

  # Sampling Parameters for diversity
  temperature: 1.0
  top_p: 0.95

  # Scaling & Stability
  #scale_rewards: true      # Normalize rewards within the group
  log_completions: true    # Useful for debugging what the model is "thinking"
  num_completions_to_print: 2

# --- Training Infrastructure ---
accelerator_config:
  dispatch_batches: true
  split_batches: true

output_dir: ./axolotl-models/
micro_batch_size: 1        # Keep small for GRPO as num_generations multiplies effective batch
gradient_accumulation_steps: 8
gradient_checkpointing: "offload"
sequence_len: 1024
flash_attention: true

# --- Dataset & Plugins ---
datasets:
  - type: atropos

plugins:
  - "axolotl.integrations.cut_cross_entropy.CutCrossEntropyPlugin"
  - "plugin_atropos.AtroposPlugin"

# --- Logging & Checkpointing ---
logging_steps: 1
eval_steps: 20
save_steps: 20
max_steps: 100
save_total_limit: 3
wandb_project: axolotl-chessenv-fft
wandb_watch: gradients

# --- Precision ---
bf16: true
tf32: true
gc_steps: 1
